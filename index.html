<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KAKA WAR — سیزن هفتم | پنل فرماندهی</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#12140d; --panel:#1c2016; --panel2:#242a1b; --line:#3a4028;
  --khaki:#8f9a68; --brass:#cda250; --brass-dim:#8a6f34; --blood:#a8433d;
  --allied:#4a7a94; --axis:#a8433d; --neutral:#7d7a63;
  --cream:#eee8d6; --muted:#9a9884;
}
*{box-sizing:border-box}
body{margin:0;background:
  radial-gradient(1200px 600px at 10% -10%, #1a1f13 0%, transparent 60%),
  radial-gradient(1000px 500px at 100% 0%, #1a1a12 0%, transparent 55%),
  var(--bg);
  color:var(--cream); font-family:'Vazirmatn',sans-serif; min-height:100vh;}
.mono{font-family:'Space Mono',monospace; direction:ltr; unicode-bidi:embed;}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}

.topbar{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#171a10 0%,#12140d 100%);
  border-bottom:1px solid var(--line); padding:10px 14px;}
.brand{display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand h1{font-size:15px;margin:0;letter-spacing:.5px;font-weight:800;color:var(--brass)}
.brand .sub{font-size:11px;color:var(--muted)}
.seal{width:34px;height:34px;border-radius:50%;border:2px solid var(--brass);display:flex;
  align-items:center;justify-content:center;font-size:14px;color:var(--brass);flex:0 0 auto;
  box-shadow:0 0 0 3px rgba(205,162,80,.12);}
.ticker{overflow:hidden;white-space:nowrap;border-top:1px solid var(--line);margin-top:8px;padding-top:6px;}
.ticker-inner{display:inline-block;animation:tick 30s linear infinite;font-size:11px;color:var(--khaki)}
@keyframes tick{from{transform:translateX(100%)}to{transform:translateX(-100%)}}

.wrap{max-width:920px;margin:0 auto;padding:14px 12px 90px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px;
  box-shadow:0 1px 0 rgba(0,0,0,.3) inset;}
.card h2{margin:0 0 10px;font-size:13px;color:var(--brass);letter-spacing:.3px;display:flex;align-items:center;gap:6px}
.card h2::before{content:'';width:4px;height:14px;background:var(--brass);display:inline-block;border-radius:2px}
.hr{border:none;border-top:1px dashed var(--line);margin:10px 0}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.stat{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 10px}
.stat .l{font-size:10px;color:var(--muted)}
.stat .v{font-size:16px;font-weight:700;color:var(--cream)}
.stat .v.mono{font-size:15px}

.btn{background:var(--brass);color:#1a1a10;border:none;border-radius:7px;padding:9px 14px;font-weight:700;
  font-family:inherit;font-size:12.5px;cursor:pointer;}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:transparent;border:1px solid var(--brass-dim);color:var(--brass)}
.btn.danger{background:var(--blood);color:#fff}
.btn.small{padding:6px 10px;font-size:11.5px;border-radius:6px}
.btn:disabled{opacity:.4}

input,select,textarea{width:100%;background:#10120b;border:1px solid var(--line);color:var(--cream);
  border-radius:7px;padding:9px 10px;font-family:inherit;font-size:13px;}
label{font-size:11px;color:var(--muted);display:block;margin:6px 0 4px}

.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid var(--line)}
.tag.allied{color:var(--allied);border-color:var(--allied)}
.tag.axis{color:var(--axis);border-color:var(--axis)}
.tag.neutral{color:var(--neutral);border-color:var(--neutral)}
.vip{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--brass);border:1px solid var(--brass-dim);
  border-radius:20px;padding:2px 8px}
.vip::before{content:'✦'}

.tabs{display:flex;gap:6px;overflow-x:auto;padding:2px 0 10px;-webkit-overflow-scrolling:touch}
.tabs button{flex:0 0 auto;background:var(--panel2);border:1px solid var(--line);color:var(--muted);
  padding:8px 12px;border-radius:20px;font-family:inherit;font-size:12px;cursor:pointer}
.tabs button.active{background:var(--brass);color:#1a1a10;border-color:var(--brass);font-weight:700}

.item-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)}
.item-row:last-child{border-bottom:none}
.item-name{font-size:12.5px}
.item-price{font-size:11px;color:var(--khaki)}
.qtybox{display:flex;align-items:center;gap:6px}
.qtybox input{width:52px;text-align:center;padding:6px}

.list-empty{color:var(--muted);font-size:12px;text-align:center;padding:16px 0}
.req{border:1px solid var(--line);border-radius:8px;padding:10px;margin-bottom:8px;background:var(--panel2)}
.req .top{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
.req .body{font-size:13px;margin-top:4px}
.status{font-size:10px;padding:2px 8px;border-radius:20px}
.status.pending{background:#3a3418;color:#e0c15c}
.status.approved{background:#1e3a22;color:#7fd996}
.status.rejected{background:#3a1e1e;color:#e08a8a}

.log-entry{border-right:3px solid var(--brass-dim);padding:6px 10px;margin-bottom:8px;background:var(--panel2);border-radius:0 8px 8px 0}
.log-entry .meta{font-size:10px;color:var(--muted)}

table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:6px 5px;border-bottom:1px solid var(--line);text-align:right}
th{color:var(--muted);font-weight:600;font-size:11px}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{max-width:380px;width:100%;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:24px;text-align:center}
.login-card .crest{width:56px;height:56px;margin:0 auto 10px;border-radius:50%;border:2px solid var(--brass);
  display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--brass)}
.login-card h1{font-size:17px;color:var(--brass);margin:4px 0 2px}
.login-card p{font-size:11.5px;color:var(--muted);margin:0 0 16px}
.err{color:#e08a8a;font-size:11.5px;margin-top:8px;min-height:14px}
.hint{font-size:10px;color:var(--muted);margin-top:14px;line-height:1.8}

.pillrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.pill{font-size:10px;background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:3px 9px;color:var(--khaki)}

.topnav{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}
.logoutbtn{font-size:11px;color:var(--muted);background:none;border:1px solid var(--line);border-radius:20px;padding:5px 10px;cursor:pointer}
.small-muted{font-size:11px;color:var(--muted)}
</style>
</head>

/* ============================= FIREBASE (REST) ============================= */
const FIREBASE_DB_URL = 'https://kaka-war-default-rtdb.firebaseio.com';

async function fbGet(path){
  const res = await fetch(`${FIREBASE_DB_URL}/${path}.json`);
  if(!res.ok) throw new Error('firebase get failed: '+res.status);
  return res.json();
}
async function fbSet(path, value){
  const res = await fetch(`${FIREBASE_DB_URL}/${path}.json`, {
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(value)
  });
  if(!res.ok) throw new Error('firebase set failed: '+res.status);
  return res.json();
}
// Atomic multi-path patch: updates keys like "requests/abc123" or "countries/uk/budget"
// without touching any other data. This is critical with 30-40 concurrent players —
// a full-tree overwrite (fbSet) would silently drop another player's simultaneous change.
async function fbPatch(updates){
  const res = await fetch(`${FIREBASE_DB_URL}/kakawar-state.json`, {
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(updates)
  });
  if(!res.ok) throw new Error('firebase patch failed: '+res.status);
  return res.json();
}

/* ============================= STATE ============================= */
let STATE = null;
let SESSION = null; // {role:'player'|'admin', countryId}
let VIEW = { tab:'overview' };
let SAVING = false;

function freshState(){
  const countries = {};
  COUNTRY_SEED.forEach(([id,fa,en,faction,vip])=>{
    countries[id] = {
      id, name_fa:fa, name_en:en, faction, vip,
      code: id.toUpperCase()+'-'+CODE_SUFFIX[id],
      budget: vip?8000:3000,
      population: vip?25000:10000,
      satisfaction: 50,
      oilBarrels: vip?60:20,
      resources:{steel:0,ammo:0,food:0,fuelTon:0},
      inventory: vip? {'1000 سرباز ورماخت':5,'10 پانزر 1':3,'10 توپ 75 میلیمتری':2,'100 ملوان':3} : {},
      buildings:{},
      satisfactionItems:{},
      inventions:[],
      stockPrice: vip?250:100,
      holdings:{},
      nuclearProgram:false,
    };
  });
  return {
    season:SEASON, adminCode:DEFAULT_ADMIN_CODE, countries,
    requests:{}, stockLog:{}, warLog:{}
  };
}

// Firebase Realtime DB silently OMITS any field whose value is an empty object/array
// (e.g. inventory:{} on a fresh country) — so after a round-trip those keys are simply
// missing, not {}. This backfills them so the rest of the code can safely assume they exist.
function normalizeState(data){
  if(!data) return freshState();
  if(!data.season) data.season = SEASON;
  if(!data.adminCode) data.adminCode = DEFAULT_ADMIN_CODE;
  if(!data.requests || Array.isArray(data.requests)) data.requests = {};
  if(!data.stockLog || Array.isArray(data.stockLog)) data.stockLog = {};
  if(!data.warLog || Array.isArray(data.warLog)) data.warLog = {};
  if(!data.countries) data.countries = {};
  Object.values(data.countries).forEach(c=>{
    if(!c.inventory) c.inventory = {};
    if(!c.buildings) c.buildings = {};
    if(!c.satisfactionItems) c.satisfactionItems = {};
    if(!c.holdings) c.holdings = {};
    if(!c.inventions) c.inventions = [];
    if(!c.resources) c.resources = {steel:0,ammo:0,food:0,fuelTon:0};
    else{
      c.resources.steel = c.resources.steel||0; c.resources.ammo = c.resources.ammo||0;
      c.resources.food = c.resources.food||0; c.resources.fuelTon = c.resources.fuelTon||0;
    }
  });
  return data;
}

async function loadState(){
  try{
    const data = await fbGet('kakawar-state');
    STATE = normalizeState(data);
  }catch(e){ console.error('load failed', e); STATE = freshState(); }
}
async function saveState(){
  if(SAVING) return;
  SAVING = true;
  try{ await fbSet('kakawar-state', STATE); }
  catch(e){ console.error('save failed', e); }
  SAVING = false;
}
// Scoped save: only writes the given leaf paths (e.g. {'requests/abc':obj, 'countries/uk/budget':500}).
// Prefer this over saveState() for player/admin actions so concurrent users never clobber each other.
async function patchState(updates){
  try{ await fbPatch(updates); }
  catch(e){ console.error('patch failed, falling back to full save', e); await saveState(); }
}

function country(id){ return STATE.countries[id]; }
function factionTag(f){ const x=FACTIONS[f]; return `<span class="tag ${x.cls}">${x.label}</span>`; }
function reqList(){ return Object.values(STATE.requests||{}); }
function stockLogList(){ return Object.values(STATE.stockLog||{}); }
function warLogList(){ return Object.values(STATE.warLog||{}); }

function esc(s){ return String(s).replace(/'/g,"\\'"); }

async function boot(){
  await loadState();
  try{
    const last = localStorage.getItem('kakawar-mycode');
    if(last) window.__lastCode = last;
  }catch(e){}
  render();
}

function render(){
  const app = document.getElementById('app');
  if(!SESSION){ app.innerHTML = renderLogin(); attachLogin(); return; }
  startPolling();
  if(SESSION.role==='admin'){ app.innerHTML = renderAdminShell(); attachAdmin(); return; }
  app.innerHTML = renderPlayerShell(); attachPlayer();
}

function renderLogin(){
  return `
  <div class="login-wrap">
    <div class="login-card">

      <h1>KAKA WAR — سیزن ${STATE.season}</h1>

      <div class="err" id="loginErr"></div>
      <div class="hint">هر کشور یک کد ثابت و اختصاصی دارد که فقط توسط مدیریت به بازیکن داده می‌شود.<br>مدیریت دیگر نیازی به ساخت کد ندارد — کدها از پیش برای همه کشورهای سیزن ${STATE.season} تعیین شده‌اند.</div>
    </div>
  </div>`;
}
function attachLogin(){
  const btn = document.getElementById('loginBtn');
  const inp = document.getElementById('loginCode');
  const go = async ()=>{
    const val = (inp.value||'').trim().toUpperCase();
    if(!val){ document.getElementById('loginErr').textContent='یک کد وارد کنید.'; return; }
    if(val === STATE.adminCode.toUpperCase()){
      SESSION = {role:'admin'}; VIEW={tab:'overview'};
      try{ localStorage.setItem('kakawar-mycode', val); }catch(e){}
      render(); return;
    }
    const found = Object.values(STATE.countries).find(c=>c.code.toUpperCase()===val);
    if(found){
      SESSION = {role:'player', countryId:found.id}; VIEW={tab:'overview'};
      try{ localStorage.setItem('kakawar-mycode', val); }catch(e){}
      render(); return;
    }
    document.getElementById('loginErr').textContent='کد نامعتبر است. با مدیریت لیگ تماس بگیرید.';
  };
  btn.onclick = go;
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter') go(); });
}

function logout(){ SESSION=null; render(); }

/* ============================= TICKER ============================= */
function tickerText(){
  const parts = [];
  warLogList().sort((a,b)=>a.at-b.at).slice(-4).reverse().forEach(w=> parts.push(`⚔ ${country(w.attackerId)?.name_fa||'?'} ↔ ${country(w.defenderId)?.name_fa||'?'}: ${w.text}`));
  stockLogList().sort((a,b)=>a.at-b.at).slice(-4).reverse().forEach(s=> parts.push(`📈 ${country(s.buyerId)?.name_fa} ${s.action==='buy'?'خرید':'فروخت'} ${s.shares} سهم ${country(s.targetId)?.name_fa}`));
  if(!parts.length) return 'به پنل فرماندهی کاکا وار خوش آمدید — همه رویدادها اینجا نمایش داده می‌شود.';
  return parts.join('   •   ');
}

function gradeLabel(g){ return {great:'🎉 رول فوق‌العاده', good:'✅ رول موفق', mixed:'⚖️ نیمه‌موفق', bad:'⚠️ ناموفق', disaster:'💥 فاجعه‌بار'}[g]||'نتیجه رول'; }
function deltaSummary(o){
  const parts=[];
  const pair=[['budget','شاهی'],['oilBarrels','بشکه نفت'],['satisfaction','رضایت'],['steel','فولاد'],['ammo','مهمات'],['food','آذوقه'],['fuelTon','سوخت']];
  pair.forEach(([k,l])=>{ if(o[k]) parts.push(`${o[k]>0?'+':''}${o[k]} ${l}`); });
  return parts.length? parts.join('، ') : 'بدون تغییر منابع';
}

async function analyzeRoll(c, text){
  if(!text || text.trim().length < 15){ alert('متن رول را کامل‌تر و طولانی‌تر بنویسید (حداقل چند جمله).'); return; }
  const btn = document.getElementById('rollSubmit');
  const loading = document.getElementById('rollLoading');
  if(btn){ btn.disabled = true; }
  if(loading){ loading.style.display = 'block'; }

  // NOTE: this used to call api.anthropic.com directly for AI-graded outcomes.
  // That endpoint only works from inside a live Claude.ai artifact (which proxies
  // the request); once hosted on GitHub Pages there is no API key and the call
  // would just fail every time. So rolls are graded with weighted randomness
  // instead, scaled a bit by how long/detailed the written roll is.
  const lengthBonus = Math.min(20, Math.floor(text.trim().length/40));
  const n = Math.floor(Math.random()*100) + 1 + lengthBonus;
  let outcome;
  if(n>=95) outcome = {grade:'great', narrative:'رول شما با شانس بالا همراه شد و نتیجه‌ای فوق‌العاده برای کشور رقم خورد.', budget:2500, oilBarrels:10, satisfaction:8, steel:0, ammo:0, food:0, fuelTon:0};
  else if(n>=65) outcome = {grade:'good', narrative:'تلاش کشور شما نتیجه‌ی خوبی به همراه داشت.', budget:800, oilBarrels:5, satisfaction:3, steel:0, ammo:0, food:0, fuelTon:0};
  else if(n>=35) outcome = {grade:'mixed', narrative:'نتیجه‌ای نیمه‌موفق حاصل شد؛ نه شکست بود نه پیروزی کامل.', budget:0, oilBarrels:0, satisfaction:0, steel:0, ammo:0, food:0, fuelTon:0};
  else outcome = {grade:'bad', narrative:'اقدام کشور شما نتیجه چندانی نداد و منابعی هدر رفت.', budget:-300, oilBarrels:0, satisfaction:-2, steel:0, ammo:0, food:0, fuelTon:0};

  const clamp=(v,lo,hi)=> Math.max(lo,Math.min(hi, Math.round(Number(v))||0));
  outcome.budget = clamp(outcome.budget,-3000,6000);
  outcome.oilBarrels = clamp(outcome.oilBarrels,-30,50);
  outcome.satisfaction = clamp(outcome.satisfaction,-15,20);
  outcome.steel = clamp(outcome.steel,-150,300);
  outcome.ammo = clamp(outcome.ammo,-150,300);
  outcome.food = clamp(outcome.food,-150,300);
  outcome.fuelTon = clamp(outcome.fuelTon,-150,300);
  if(!['great','good','mixed','bad','disaster'].includes(outcome.grade)) outcome.grade='mixed';
  if(!outcome.narrative) outcome.narrative = 'نتیجه رول ثبت شد.';

  c.budget = Math.max(0, c.budget + outcome.budget);
  c.oilBarrels = Math.max(0, c.oilBarrels + outcome.oilBarrels);
  c.satisfaction = Math.max(0, Math.min(100, c.satisfaction + outcome.satisfaction));
  c.resources.steel = Math.max(0, c.resources.steel + outcome.steel);
  c.resources.ammo = Math.max(0, c.resources.ammo + outcome.ammo);
  c.resources.food = Math.max(0, c.resources.food + outcome.food);
  c.resources.fuelTon = Math.max(0, c.resources.fuelTon + outcome.fuelTon);

  const rid = uid();
  const reqEntry = {id:rid, countryId:c.id, kind:'roll', payload:{text, outcome}, status:'approved',
    summary:`رول: ${text.slice(0,90)}${text.length>90?'…':''}`, createdAt:Date.now(),
    resultNote:`${gradeLabel(outcome.grade)} — ${outcome.narrative} (${deltaSummary(outcome)})`};
  STATE.requests[rid] = reqEntry;
  await patchState({
    [`requests/${rid}`]: reqEntry,
    [`countries/${c.id}/budget`]: c.budget,
    [`countries/${c.id}/oilBarrels`]: c.oilBarrels,
    [`countries/${c.id}/satisfaction`]: c.satisfaction,
    [`countries/${c.id}/resources`]: c.resources,
  });
  if(btn){ btn.disabled=false; }
  if(loading){ loading.style.display='none'; }
  VIEW.tab='requests'; render();
}

async function submitRequest(c, kind, payload, summary){
  const rid = uid();
  const reqEntry = {id:rid, countryId:c.id, kind, payload, summary, status:'pending', createdAt:Date.now(), resultNote:''};
  STATE.requests[rid] = reqEntry;
  await patchState({[`requests/${rid}`]: reqEntry});
  VIEW.tab='requests'; render();
}

async function doStockTrade(c, targetId, qty, action){
  const t = country(targetId);
  const total = t.stockPrice * qty;
  if(action==='buy'){
    if(c.budget < total){ alert('بودجه کافی نیست.'); return; }
    c.budget -= total; c.holdings[targetId] = (c.holdings[targetId]||0)+qty;
  } else {
    const have = c.holdings[targetId]||0;
    if(have < qty){ alert('سهام کافی برای فروش ندارید.'); return; }
    c.holdings[targetId] = have - qty; c.budget += total;
  }
  const sid = uid();
  const logEntry = {id:sid, buyerId:c.id, targetId, action, shares:qty, price:t.stockPrice, total, at:Date.now()};
  STATE.stockLog[sid] = logEntry;
  await patchState({
    [`stockLog/${sid}`]: logEntry,
    [`countries/${c.id}/budget`]: c.budget,
    [`countries/${c.id}/holdings`]: c.holdings,
  });
  render();
}

    await patchState({
      [`countries/${cid}/budget`]: c.budget, [`countries/${cid}/population`]: c.population,
      [`countries/${cid}/satisfaction`]: c.satisfaction, [`countries/${cid}/oilBarrels`]: c.oilBarrels,
      [`countries/${cid}/resources`]: c.resources,
    });
    render();
  };
  const ccItemApply = document.getElementById('ccItemApply');
  if(ccItemApply) ccItemApply.onclick = async ()=>{
    const cid = VIEW.selCountry || Object.keys(STATE.countries)[0];
    const c = country(cid);
    const name = document.getElementById('ccItemName').value.trim();
    const qty = parseInt(document.getElementById('ccItemQty').value)||0;
    if(!name || !qty) return;
    c.inventory[name] = Math.max(0, (c.inventory[name]||0)+qty);
    await patchState({[`countries/${cid}/inventory`]: c.inventory});
    render();
  };
  document.querySelectorAll('[data-spup]').forEach(b=>b.onclick=async()=>{
    const id=b.dataset.spup; const d=parseInt(document.getElementById(`spdelta-${id}`).value)||0;
    country(id).stockPrice += d;
    await patchState({[`countries/${id}/stockPrice`]: country(id).stockPrice}); render();
  });
  document.querySelectorAll('[data-spdown]').forEach(b=>b.onclick=async()=>{
    const id=b.dataset.spdown; const d=parseInt(document.getElementById(`spdelta-${id}`).value)||0;
    country(id).stockPrice = Math.max(1, country(id).stockPrice - d);
    await patchState({[`countries/${id}/stockPrice`]: country(id).stockPrice}); render();
  });
  const waSubmit = document.getElementById('waSubmit');
  if(waSubmit) waSubmit.onclick = async ()=>{
    const attackerId = document.getElementById('waAtk').value;
    const defenderId = document.getElementById('waDef').value;
    const text = document.getElementById('waText').value.trim();
    if(!text) return;
    const id = uid();
    const entry = {id, attackerId, defenderId, text, at:Date.now(), byAdmin:true};
    STATE.warLog[id] = entry;
    await patchState({[`warLog/${id}`]: entry}); render();
  };
  document.querySelectorAll('[data-delwar]').forEach(b=>b.onclick=async()=>{
    const wid = b.dataset.delwar;
    delete STATE.warLog[wid];
    await patchState({[`warLog/${wid}`]: null}); render();
  });
  const stSave = document.getElementById('stSave');
  if(stSave) stSave.onclick = async ()=>{
    STATE.season = parseInt(document.getElementById('stSeason').value)||STATE.season;
    STATE.adminCode = (document.getElementById('stAdminCode').value||STATE.adminCode).trim();
    await patchState({season: STATE.season, adminCode: STATE.adminCode}); render();
  };
  const stReset = document.getElementById('stReset');
  if(stReset) stReset.onclick = async ()=>{
    if(!confirm('آیا مطمئن هستید؟ همه اطلاعات بازی پاک می‌شود.')) return;
    const season = STATE.season, adminCode = STATE.adminCode;
    STATE = freshState(); STATE.season = season; STATE.adminCode = adminCode;
    await saveState(); render();
  };
}

async function resolveRequest(id, approve){
  const r = STATE.requests[id];
  if(!r) return;
  const c = country(r.countryId);
  const patch = {};
  if(!approve){
    r.status='rejected'; r.resultNote='رد شد توسط مدیریت';
    await patchState({[`requests/${id}`]: r}); render(); return;
  }
  if(r.kind==='purchase'){
    const {name,price,qty,oil} = r.payload;
    const totalCost = price*qty, totalOil = (oil||0)*qty;
    if(c.budget < totalCost){ r.status='rejected'; r.resultNote='بودجه کافی نبود'; }
    else if(totalOil>0 && c.oilBarrels < totalOil){ r.status='rejected'; r.resultNote='نفت کافی نبود'; }
    else{
      c.budget -= totalCost; c.oilBarrels -= totalOil;
      c.inventory[name] = (c.inventory[name]||0)+qty;
      r.status='approved'; r.resultNote=`${fmt(totalCost)} شاهی و ${fmt(totalOil)} بشکه نفت کسر شد`;
      patch[`countries/${c.id}/budget`] = c.budget;
      patch[`countries/${c.id}/oilBarrels`] = c.oilBarrels;
      patch[`countries/${c.id}/inventory`] = c.inventory;
    }
  } else if(r.kind==='profit'){
    const {name,price,qty} = r.payload;
    const totalCost = price*qty;
    if(c.budget < totalCost){ r.status='rejected'; r.resultNote='بودجه کافی نبود'; }
    else{
      c.budget -= totalCost; c.buildings[name] = (c.buildings[name]||0)+qty;
      r.status='approved'; r.resultNote=`${fmt(totalCost)} شاهی کسر شد`;
      patch[`countries/${c.id}/budget`] = c.budget;
      patch[`countries/${c.id}/buildings`] = c.buildings;
    }
  } else if(r.kind==='satisfaction'){
    const {name,price,gain} = r.payload;
    const used = c.satisfactionItems[name]||0;
    if(used>=5){ r.status='rejected'; r.resultNote='سقف ۵ عدد پر شده'; }
    else if(c.budget<price){ r.status='rejected'; r.resultNote='بودجه کافی نبود'; }
    else{
      c.budget -= price; c.satisfactionItems[name]=used+1;
      c.satisfaction = Math.min(100, c.satisfaction+gain);
      r.status='approved'; r.resultNote=`${fmt(price)} شاهی کسر شد، رضایت +${gain}`;
      patch[`countries/${c.id}/budget`] = c.budget;
      patch[`countries/${c.id}/satisfactionItems`] = c.satisfactionItems;
      patch[`countries/${c.id}/satisfaction`] = c.satisfaction;
    }
  } else if(r.kind==='invention'){
    const {name,cost} = r.payload;
    if(c.budget<cost.budget || c.resources.steel<cost.steel || c.resources.ammo<cost.ammo || c.oilBarrels<cost.oil){
      r.status='rejected'; r.resultNote='منابع کافی برای این اختراع موجود نیست';
    } else {
      c.budget -= cost.budget; c.resources.steel -= cost.steel; c.resources.ammo -= cost.ammo; c.oilBarrels -= cost.oil;
      c.inventions.push(name);
      r.status='approved'; r.resultNote='اختراع ثبت شد و منابع کسر شد';
      patch[`countries/${c.id}/budget`] = c.budget;
      patch[`countries/${c.id}/resources`] = c.resources;
      patch[`countries/${c.id}/oilBarrels`] = c.oilBarrels;
      patch[`countries/${c.id}/inventions`] = c.inventions;
    }
  }
  patch[`requests/${id}`] = r;
  await patchState(patch); render();
}

let pollTimer = null;
function startPolling(){
  if(pollTimer) return;
  pollTimer = setInterval(async ()=>{
    if(!SESSION) return;
    try{
      const data = await fbGet('kakawar-state');
      if(data){
        const incoming = JSON.stringify(data);
        if(incoming !== JSON.stringify(STATE)){
          const active = document.activeElement;
          const typing = active && ['INPUT','TEXTAREA','SELECT'].includes(active.tagName) && active.value;
          if(!typing){
            STATE = normalizeState(data);
            render();
          }
        }
      }
    }catch(e){ console.error('sync poll failed', e); }
  }, 4000);
}

boot();
